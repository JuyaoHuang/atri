# This file is the single entry point. It references sub-config
# files by path (docker-compose style). The loader at
# src/utils/config_loader.py reads this, then inlines each
# referenced sub-file into a merged dict keyed by the stem
# (e.g. llm_config -> llm).
#
# Reference: docs/LLM调用层设计讨论.md §2.5
# ============================================================

